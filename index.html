<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Recarga Eléctrica</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --surface2: #172030;
    --border: #1e2d40;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --green: #39ff14;
    --text: #e8f4f8;
    --muted: #5a7a8a;
    --danger: #ff3b5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  /* ── CONFIG ── */
  .config-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 100;
    animation: fadeIn 0.2s ease;
    padding: 30px 20px;
    overflow-y: auto;
  }
  .config-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    width: 100%; max-width: 520px;
    animation: slideUp 0.3s ease;
    position: relative;
  }
  .config-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none;
    color: var(--muted); font-size: 1.2rem; cursor: pointer;
    padding: 4px 8px; border-radius: 6px; transition: color 0.2s;
  }
  .config-close:hover { color: var(--text); }
  .config-box h2 {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
    color: var(--accent); margin-bottom: 8px;
  }
  .config-box > p { color: var(--muted); font-size: 0.78rem; margin-bottom: 24px; line-height: 1.6; }
  .config-section { border-top: 1px solid var(--border); padding-top: 20px; margin-top: 20px; }
  .config-section-title {
    font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 14px;
  }
  .config-box label {
    display: block; font-size: 0.72rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .config-box input[type="text"],
  .config-box input[type="number"] {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.82rem;
    margin-bottom: 14px; outline: none; transition: border-color 0.2s;
  }
  .config-box input:focus { border-color: var(--accent); }
  .hint {
    background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.15);
    border-radius: 8px; padding: 12px;
    font-size: 0.72rem; color: var(--muted); line-height: 1.7; margin-bottom: 16px;
  }
  .hint a { color: var(--accent); text-decoration: none; }

  /* ── STATION SEARCH ── */
  .station-search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .station-search-row input { flex: 1; margin-bottom: 0 !important; }
  .station-results {
    max-height: 220px; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px;
  }
  .station-results::-webkit-scrollbar { width: 4px; }
  .station-results::-webkit-scrollbar-track { background: var(--surface2); }
  .station-results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .station-result-item {
    padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid rgba(30,45,64,0.5); transition: background 0.15s;
  }
  .station-result-item:last-child { border-bottom: none; }
  .station-result-item:hover { background: rgba(0,229,255,0.06); }
  .station-result-item.selected { background: rgba(0,229,255,0.1); border-left: 2px solid var(--accent); }
  .station-name { font-size: 0.8rem; color: var(--text); font-weight: 500; margin-bottom: 2px; }
  .station-addr { font-size: 0.7rem; color: var(--muted); }
  .station-price-badge { font-size: 0.7rem; color: var(--accent2); float: right; margin-top: 2px; }
  .station-selected-box {
    background: rgba(57,255,20,0.06); border: 1px solid rgba(57,255,20,0.2);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 0.78rem;
  }
  .station-selected-box .sel-name { color: var(--green); font-weight: 500; margin-bottom: 2px; }
  .station-selected-box .sel-addr { color: var(--muted); font-size: 0.7rem; }

  /* ── HEADER ── */
  header {
    padding: 24px 32px 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;
    color: var(--accent); display: flex; align-items: center; gap: 10px;
  }
  .logo span { color: var(--text); opacity: 0.6; font-size: 0.9rem; font-weight: 400; }
  .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .month-nav {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 6px 12px; font-size: 0.8rem; color: var(--text);
  }
  .month-nav button {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; padding: 0 4px; transition: color 0.2s;
  }
  .month-nav button:hover { color: var(--accent); }

  /* ── BUTTONS ── */
  .btn {
    padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 500;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: #33eeff; transform: translateY(-1px); }
  .btn-ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-danger {
    background: rgba(255,59,92,0.1); color: var(--danger);
    border: 1px solid rgba(255,59,92,0.2); padding: 4px 10px; font-size: 0.72rem;
  }
  .btn-danger:hover { background: rgba(255,59,92,0.2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ── MAIN ── */
  main { padding: 24px 32px; max-width: 1100px; margin: 0 auto; }

  /* ── KPI ── */
  .kpi-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    position: relative; overflow: hidden; transition: border-color 0.2s;
  }
  .kpi:hover { border-color: var(--muted); }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi.cyan::before   { background: var(--accent); }
  .kpi.orange::before { background: var(--accent2); }
  .kpi.green::before  { background: var(--green); }
  .kpi.muted::before  { background: var(--muted); }
  .kpi-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .kpi-value { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 700; line-height: 1; }
  .kpi.cyan .kpi-value   { color: var(--accent); }
  .kpi.orange .kpi-value { color: var(--accent2); }
  .kpi.green .kpi-value  { color: var(--green); }
  .kpi-sub { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }

  /* ── COLS ── */
  .cols { display: grid; grid-template-columns: 340px 1fr; gap: 20px; align-items: start; }

  @media (max-width: 800px) {
    .cols { grid-template-columns: 1fr; }
    header { padding: 16px; flex-wrap: wrap; gap: 12px; }
    main { padding: 16px; }
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── CARD / FORM ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .card-title {
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 20px;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .field input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── KM SECTION ── */
  .km-section {
    background: rgba(0,229,255,0.04); border: 1px solid rgba(0,229,255,0.12);
    border-radius: 10px; padding: 14px; margin-top: 16px;
  }
  .km-section .km-title { font-size: 0.68rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead th { padding: 10px 14px; text-align: left; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid rgba(30,45,64,0.5); transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody td { padding: 11px 14px; color: var(--text); }
  .td-date { color: var(--muted); font-size: 0.75rem; }
  .td-eur  { color: var(--accent2); font-weight: 500; }
  .td-kwh  { color: var(--accent); }
  .td-gas  { color: var(--muted); font-size: 0.75rem; }
  .td-rate { font-size: 0.72rem; color: var(--muted); }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 0.8rem; line-height: 2; }
  .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 12px; opacity: 0.4; }

  /* ── COMPARADOR ── */
  .comparador { margin-top: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
  .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .comp-item { background: var(--surface2); border-radius: 10px; padding: 16px; text-align: center; }
  .comp-item .comp-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .comp-item .comp-val { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
  .comp-item.electric .comp-val { color: var(--accent); }
  .comp-item.gas .comp-val      { color: var(--accent2); }
  .comp-item .comp-unit { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .saving-badge { margin-top: 16px; background: rgba(57,255,20,0.08); border: 1px solid rgba(57,255,20,0.2); border-radius: 8px; padding: 12px 16px; text-align: center; font-size: 0.82rem; color: var(--green); }

  /* ── STATUS ── */
  .status-bar { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.ok      { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.error   { background: var(--danger); }
  .dot.loading { background: var(--accent); animation: pulse 1s infinite; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 50; animation: fadeIn 0.15s ease; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 90%; max-width: 420px; animation: slideUp 0.2s ease; }
  .modal h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .modal p { color: var(--muted); font-size: 0.78rem; margin-bottom: 20px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .saving-indicator { font-size: 0.72rem; color: var(--accent); display: flex; align-items: center; gap: 6px; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn  { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  @keyframes pulse   { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const CLIENT_ID_KEY = 'ev_goog_client_id';
const SHEET_ID_KEY  = 'ev_sheet_id';
const TOKEN_KEY     = 'ev_goog_token';
const TOKEN_EXP_KEY = 'ev_goog_token_exp';
const CONSUMO_KEY   = 'ev_consumo_ref';
const STATION_KEY   = 'ev_ref_station';

const SCOPES     = 'https://www.googleapis.com/auth/spreadsheets';
const SHEET_NAME = 'Recargas';
const HEADERS    = ['Fecha', 'Coste (€)', 'kWh', '€/kWh', 'Precio Gasolina (€/L)'];
const MESES      = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                    'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MITECO_URL = 'https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/';

// ─── GOOGLE HELPERS ───────────────────────────────────────────────────────────
function getToken() {
  const exp = parseInt(localStorage.getItem(TOKEN_EXP_KEY) || '0');
  if (Date.now() > exp) { localStorage.removeItem(TOKEN_KEY); return null; }
  return localStorage.getItem(TOKEN_KEY);
}
function saveToken(tok, exp = 3600) {
  localStorage.setItem(TOKEN_KEY, tok);
  localStorage.setItem(TOKEN_EXP_KEY, String(Date.now() + exp * 1000 - 60000));
}
async function sheetsReq(tok, method, path, body) {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${path}`, {
    method,
    headers: { 'Authorization': `Bearer ${tok}`, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  return res.json();
}
async function ensureSheet(tok, sid) {
  const meta = await sheetsReq(tok, 'GET', sid);
  if (!meta.sheets.some(s => s.properties.title === SHEET_NAME)) {
    await sheetsReq(tok, 'POST', `${sid}:batchUpdate`, { requests: [{ addSheet: { properties: { title: SHEET_NAME } } }] });
    await sheetsReq(tok, 'PUT', `${sid}/values/${SHEET_NAME}!A1:E1?valueInputOption=RAW`, { values: [HEADERS] });
  }
}
async function appendRow(tok, sid, row) {
  await sheetsReq(tok, 'POST', `${sid}/values/${SHEET_NAME}!A:E:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`, { values: [row] });
}
async function fetchRows(tok, sid) {
  const data = await sheetsReq(tok, 'GET', `${sid}/values/${SHEET_NAME}!A:E`);
  return (data.values || []).slice(1).map((r, i) => ({
    rowIndex: i + 2, fecha: r[0] || '',
    coste: parseFloat(r[1]) || 0, kwh: parseFloat(r[2]) || 0,
    precioKwh: parseFloat(r[3]) || 0, precioGas: parseFloat(r[4]) || 0,
  }));
}
async function deleteRow(tok, sid, rowIndex) {
  const meta = await sheetsReq(tok, 'GET', sid);
  const sheet = meta.sheets.find(s => s.properties.title === SHEET_NAME);
  if (!sheet) throw new Error('Hoja no encontrada');
  await sheetsReq(tok, 'POST', `${sid}:batchUpdate`, {
    requests: [{ deleteDimension: { range: { sheetId: sheet.properties.sheetId, dimension: 'ROWS', startIndex: rowIndex - 1, endIndex: rowIndex } } }]
  });
}

// ─── MITECO HELPERS ───────────────────────────────────────────────────────────
function parseGasPrice(str) { return parseFloat((str || '').replace(',', '.')); }
async function fetchAllStations() {
  const res = await fetch(MITECO_URL);
  const data = await res.json();
  return data.ListaEESSPrecio || [];
}
function getSavedStation() {
  try { return JSON.parse(localStorage.getItem(STATION_KEY) || 'null'); } catch { return null; }
}

// ─── CONFIG PANEL ─────────────────────────────────────────────────────────────
function ConfigPanel({ onClose, isFirstTime }) {
  const [clientId, setClientId] = useState(localStorage.getItem(CLIENT_ID_KEY) || '');
  const [sheetId,  setSheetId]  = useState(localStorage.getItem(SHEET_ID_KEY)  || '');
  const [consumo,  setConsumo]  = useState(localStorage.getItem(CONSUMO_KEY)   || '7');
  const [refStation, setRefStation] = useState(getSavedStation());

  const [searchQuery,   setSearchQuery]   = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching,     setSearching]     = useState(false);
  const [searchErr,     setSearchErr]     = useState('');
  const allStationsRef = useRef(null);

  const doSearch = async () => {
    if (!searchQuery.trim()) return;
    setSearching(true); setSearchErr(''); setSearchResults([]);
    try {
      if (!allStationsRef.current) allStationsRef.current = await fetchAllStations();
      const q = searchQuery.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const matches = allStationsRef.current.filter(s => {
        const hay = [s['Rótulo'], s['Dirección'], s['Localidad'], s['Municipio'], s['C.P.']]
          .join(' ').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        return hay.includes(q);
      }).slice(0, 30);
      if (matches.length === 0) setSearchErr('Sin resultados. Prueba con otro nombre o localidad.');
      setSearchResults(matches);
    } catch { setSearchErr('Error al conectar con el Ministerio.'); }
    finally { setSearching(false); }
  };

  const selectStation = s => {
    setRefStation({ ideess: s['IDEESS'], rotulo: s['Rótulo'], direccion: s['Dirección'], localidad: s['Localidad'] || s['Municipio'], provincia: s['Provincia'] });
    setSearchResults([]); setSearchQuery('');
  };

  const saveConfig = () => {
    if (!clientId.trim() || !sheetId.trim()) return;
    localStorage.setItem(CLIENT_ID_KEY, clientId.trim());
    localStorage.setItem(SHEET_ID_KEY,  sheetId.trim());
    localStorage.setItem(CONSUMO_KEY,   consumo || '7');
    if (refStation) localStorage.setItem(STATION_KEY, JSON.stringify(refStation));
    else localStorage.removeItem(STATION_KEY);
    onClose();
  };

  return (
    <div className="config-overlay">
      <div className="config-box">
        {!isFirstTime && <button className="config-close" onClick={onClose}>✕</button>}

        <h2>⚙ Configuración</h2>
        <p>Conecta con Google Sheets y personaliza tu referencia de gasolina.</p>

        {/* GOOGLE */}
        <div className="config-section-title">☁ Google Sheets</div>
        <label>Google OAuth Client ID</label>
        <input type="text" value={clientId} onChange={e => setClientId(e.target.value)}
          placeholder="123456789-xxxx.apps.googleusercontent.com" />
        <label>ID del Google Sheet</label>
        <input type="text" value={sheetId} onChange={e => setSheetId(e.target.value)}
          placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" />
        <div className="hint">
          <strong>¿Cómo obtener el Client ID?</strong><br/>
          1. <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a> → Nuevo proyecto → Habilita <em>Google Sheets API</em><br/>
          2. Credenciales → Crear → OAuth 2.0 → Aplicación web<br/>
          3. Añade <code>{window.location.origin}</code> como origen autorizado<br/>
          <strong>ID del Sheet:</strong> parte larga entre <code>/d/</code> y <code>/edit</code> en la URL
        </div>

        {/* GASOLINA */}
        <div className="config-section">
          <div className="config-section-title">⛽ Referencia gasolina</div>

          <label>Consumo del coche de referencia (L/100km)</label>
          <input type="number" step="0.1" value={consumo} onChange={e => setConsumo(e.target.value)} placeholder="7" />

          {refStation ? (
            <div className="station-selected-box">
              <div className="sel-name">⛽ {refStation.rotulo}</div>
              <div className="sel-addr">{refStation.direccion} · {refStation.localidad}, {refStation.provincia}</div>
              <button className="btn btn-ghost" style={{marginTop:8, fontSize:'0.68rem', padding:'4px 10px'}}
                onClick={() => setRefStation(null)}>✕ Quitar gasolinera</button>
            </div>
          ) : (
            <div style={{fontSize:'0.7rem', color:'var(--muted)', marginBottom:12, lineHeight:1.6}}>
              Sin gasolinera de referencia — se usará la <strong style={{color:'var(--text)'}}>media nacional</strong>.
            </div>
          )}

          <label>{refStation ? 'Cambiar gasolinera de referencia' : 'Buscar gasolinera de referencia (opcional)'}</label>
          <div className="station-search-row">
            <input type="text" value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && doSearch()}
              placeholder="Nombre, localidad, dirección, CP…"
              style={{marginBottom:0}} />
            <button className="btn btn-ghost" onClick={doSearch} disabled={searching} style={{flexShrink:0}}>
              {searching ? '⟳' : '🔍'}
            </button>
          </div>

          {searchErr && <div style={{fontSize:'0.72rem', color:'var(--danger)', marginBottom:10}}>{searchErr}</div>}

          {searchResults.length > 0 && (
            <div className="station-results">
              {searchResults.map(s => {
                const p = parseGasPrice(s['Precio Gasolina 95 E5']);
                return (
                  <div key={s['IDEESS']}
                    className={`station-result-item ${refStation?.ideess === s['IDEESS'] ? 'selected' : ''}`}
                    onClick={() => selectStation(s)}>
                    <span className="station-price-badge">{(!isNaN(p) && p > 0) ? p.toFixed(3) + ' €/L' : 'sin precio'}</span>
                    <div className="station-name">{s['Rótulo']}</div>
                    <div className="station-addr">{s['Dirección']} · {s['Localidad'] || s['Municipio']} ({s['Provincia']})</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div style={{marginTop:24}}>
          <button className="btn btn-primary"
            style={{width:'100%', justifyContent:'center', padding:'12px'}}
            onClick={saveConfig} disabled={!clientId.trim() || !sheetId.trim()}>
            Guardar configuración →
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const today = new Date();
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [viewYear,  setViewYear]  = useState(today.getFullYear());
  const [showConfig, setShowConfig] = useState(!localStorage.getItem(CLIENT_ID_KEY));
  const [consumoRef, setConsumoRef] = useState(localStorage.getItem(CONSUMO_KEY) || '7');

  const [token,      setToken]      = useState(getToken());
  const [authStatus, setAuthStatus] = useState(getToken() ? 'ok' : 'idle');
  const [rows,    setRows]    = useState([]);
  const [loading, setLoading] = useState(false);
  const [saving,  setSaving]  = useState(false);
  const [error,   setError]   = useState('');
  const [kmMes,   setKmMes]   = useState('');

  const [form, setForm] = useState({
    fecha: today.toISOString().slice(0, 10), coste: '', kwh: '', precioGas: '',
  });
  const [gasFetchStatus, setGasFetchStatus] = useState('idle');
  const [gasSource,      setGasSource]      = useState('');
  const [deleteModal,    setDeleteModal]    = useState(null);

  // ── FETCH GAS PRICE ──
  const fetchPrecioGasolina = useCallback(async () => {
    setGasFetchStatus('loading');
    try {
      const stations = await fetchAllStations();
      const saved = getSavedStation();
      if (saved) {
        const found = stations.find(s => s['IDEESS'] === saved.ideess);
        if (found) {
          const p = parseGasPrice(found['Precio Gasolina 95 E5']);
          if (!isNaN(p) && p > 0) {
            setForm(f => ({...f, precioGas: String(p)}));
            setGasSource('station'); setGasFetchStatus('ok'); return;
          }
        }
      }
      // fallback: media nacional
      const prices = stations.map(s => parseGasPrice(s['Precio Gasolina 95 E5'])).filter(p => !isNaN(p) && p > 0);
      if (!prices.length) throw new Error('Sin datos');
      const avg = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length * 1000) / 1000;
      setForm(f => ({...f, precioGas: String(avg)}));
      setGasSource('nacional'); setGasFetchStatus('ok');
    } catch { setGasFetchStatus('error'); }
  }, []);

  // ── OAUTH ──
  const doAuth = useCallback(() => {
    const cid = localStorage.getItem(CLIENT_ID_KEY);
    if (!cid) { setError('Configura el Client ID primero'); return; }
    const params = new URLSearchParams({
      client_id: cid, redirect_uri: window.location.origin + window.location.pathname,
      response_type: 'token', scope: SCOPES, prompt: 'consent',
    });
    const popup = window.open(`https://accounts.google.com/o/oauth2/v2/auth?${params}`, 'oauth', 'width=520,height=620');
    const timer = setInterval(() => {
      try {
        const url = popup?.location?.href || '';
        if (url.includes('access_token')) {
          const hash = new URLSearchParams(url.split('#')[1]);
          saveToken(hash.get('access_token'), parseInt(hash.get('expires_in') || '3600'));
          setToken(hash.get('access_token')); setAuthStatus('ok');
          clearInterval(timer); popup.close();
        }
      } catch (_) {}
      if (popup?.closed) clearInterval(timer);
    }, 300);
  }, []);

  // ── IMPLICIT REDIRECT ──
  useEffect(() => {
    const hash = new URLSearchParams(window.location.hash.slice(1));
    const tok = hash.get('access_token');
    if (tok) {
      saveToken(tok, parseInt(hash.get('expires_in') || '3600'));
      setToken(tok); setAuthStatus('ok');
      window.history.replaceState(null, '', window.location.pathname);
    }
  }, []);

  // ── LOAD ROWS ──
  const loadRows = useCallback(async (tok, sid) => {
    if (!tok || !sid) return;
    setLoading(true); setError('');
    try {
      await ensureSheet(tok, sid);
      setRows(await fetchRows(tok, sid));
    } catch (e) {
      if (e.message.includes('401') || e.message.includes('invalid_token')) {
        setAuthStatus('expired'); setToken(null); localStorage.removeItem(TOKEN_KEY);
      } else { setError(e.message); }
    } finally { setLoading(false); }
  }, []);

  useEffect(() => {
    const sid = localStorage.getItem(SHEET_ID_KEY);
    if (token && sid) loadRows(token, sid);
  }, [token, loadRows]);

  useEffect(() => { fetchPrecioGasolina(); }, [fetchPrecioGasolina]);

  // ── SUBMIT ──
  const handleSubmit = async () => {
    if (!form.coste || !form.kwh || !form.fecha || !form.precioGas) { setError('Rellena todos los campos'); return; }
    if (!token) { setError('Inicia sesión con Google primero'); return; }
    const sid = localStorage.getItem(SHEET_ID_KEY);
    const coste = parseFloat(form.coste), kwh = parseFloat(form.kwh), pgas = parseFloat(form.precioGas);
    setSaving(true); setError('');
    try {
      await appendRow(token, sid, [form.fecha, coste, kwh, kwh > 0 ? +(coste/kwh).toFixed(4) : 0, pgas]);
      await loadRows(token, sid);
      setForm({ fecha: today.toISOString().slice(0,10), coste: '', kwh: '', precioGas: '' });
      fetchPrecioGasolina();
    } catch (e) { setError(e.message); }
    finally { setSaving(false); }
  };

  // ── DELETE ──
  const confirmDelete = async () => {
    if (!deleteModal) return;
    setSaving(true);
    try {
      await deleteRow(token, localStorage.getItem(SHEET_ID_KEY), deleteModal.rowIndex);
      await loadRows(token, localStorage.getItem(SHEET_ID_KEY));
    } catch (e) { setError(e.message); }
    finally { setSaving(false); setDeleteModal(null); }
  };

  // ── FILTER + KPIs ──
  const filteredRows = rows.filter(r => { if (!r.fecha) return false; const d = new Date(r.fecha); return d.getMonth() === viewMonth && d.getFullYear() === viewYear; });
  const totalCoste   = filteredRows.reduce((s,r) => s + r.coste, 0);
  const totalKwh     = filteredRows.reduce((s,r) => s + r.kwh, 0);
  const avgPrecioKwh = totalKwh > 0 ? totalCoste / totalKwh : 0;
  const avgPrecioGas = filteredRows.length ? filteredRows.reduce((s,r) => s + r.precioGas, 0) / filteredRows.length : 0;
  const kmsMes       = parseFloat(kmMes) || 0;
  const costKmElec   = kmsMes > 0 ? totalCoste / kmsMes : 0;
  const cRef         = parseFloat(localStorage.getItem(CONSUMO_KEY) || '7');
  const costKmGas    = avgPrecioGas > 0 ? cRef * avgPrecioGas / 100 : 0;
  const ahorro       = costKmGas > 0 && costKmElec > 0 ? ((costKmGas - costKmElec) / costKmGas * 100).toFixed(1) : null;

  const prevMonth = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(y=>y-1); } else setViewMonth(m=>m-1); };
  const nextMonth = () => { if (viewMonth === 11) { setViewMonth(0); setViewYear(y=>y+1); } else setViewMonth(m=>m+1); };

  const stationRef = getSavedStation();

  const handleConfigClose = () => {
    setConsumoRef(localStorage.getItem(CONSUMO_KEY) || '7');
    setShowConfig(false);
    fetchPrecioGasolina();
  };

  return (
    <>
      {showConfig && <ConfigPanel onClose={handleConfigClose} isFirstTime={!localStorage.getItem(CLIENT_ID_KEY)} />}

      {deleteModal && (
        <div className="modal-overlay">
          <div className="modal">
            <h3>¿Eliminar recarga?</h3>
            <p>Se eliminará la recarga del <strong>{deleteModal.fecha}</strong> de {deleteModal.coste.toFixed(2)}€. Esta acción no se puede deshacer.</p>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setDeleteModal(null)}>Cancelar</button>
              <button className="btn btn-danger" style={{fontSize:'0.8rem',padding:'8px 16px'}} onClick={confirmDelete}>Eliminar</button>
            </div>
          </div>
        </div>
      )}

      <header>
        <div className="logo">⚡ EV Tracker <span>/ recargas</span></div>
        <div className="header-actions">
          <div className="status-bar">
            <div className={`dot ${authStatus === 'ok' ? 'ok' : authStatus === 'expired' ? 'error' : loading ? 'loading' : ''}`}/>
            {authStatus === 'ok' ? 'Conectado' : authStatus === 'expired' ? 'Token expirado' : 'Sin sesión'}
          </div>
          {authStatus !== 'ok' && <button className="btn btn-primary" onClick={doAuth}>🔑 Iniciar sesión</button>}
          {authStatus === 'ok' && <button className="btn btn-ghost" onClick={() => loadRows(token, localStorage.getItem(SHEET_ID_KEY))} disabled={loading}>{loading ? '⟳' : '↻'} Actualizar</button>}
          <button className="btn btn-ghost" onClick={() => setShowConfig(true)}>⚙ Config</button>
        </div>
      </header>

      <main>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px'}}>
          <div className="month-nav">
            <button onClick={prevMonth}>‹</button>
            <span style={{fontFamily:'Syne,sans-serif', fontWeight:600, minWidth:140, textAlign:'center'}}>{MESES[viewMonth]} {viewYear}</span>
            <button onClick={nextMonth}>›</button>
          </div>
          <div style={{display:'flex', gap:12, alignItems:'center'}}>
            {saving && <div className="saving-indicator"><span className="dot loading"/>Guardando...</div>}
            {error  && <div style={{fontSize:'0.75rem', color:'var(--danger)'}}>{error}</div>}
          </div>
        </div>

        <div className="kpi-strip">
          <div className="kpi cyan">
            <div className="kpi-label">Total gastado</div>
            <div className="kpi-value">{totalCoste.toFixed(2)}€</div>
            <div className="kpi-sub">{filteredRows.length} recargas</div>
          </div>
          <div className="kpi orange">
            <div className="kpi-label">Total kWh</div>
            <div className="kpi-value">{totalKwh.toFixed(1)}</div>
            <div className="kpi-sub">kWh cargados</div>
          </div>
          <div className="kpi muted">
            <div className="kpi-label">Precio medio kWh</div>
            <div className="kpi-value" style={{color:'var(--text)', fontSize:'1.5rem'}}>{avgPrecioKwh > 0 ? avgPrecioKwh.toFixed(4) + '€' : '—'}</div>
            <div className="kpi-sub">€ por kWh</div>
          </div>
          <div className="kpi green">
            <div className="kpi-label">Coste / km</div>
            <div className="kpi-value">{costKmElec > 0 ? costKmElec.toFixed(4) + '€' : '—'}</div>
            <div className="kpi-sub">{kmsMes > 0 ? `${kmsMes} km este mes` : 'Introduce km abajo'}</div>
          </div>
        </div>

        <div className="cols">
          <div>
            <div className="card">
              <div className="card-title">Nueva recarga</div>

              <div className="field">
                <label>Fecha</label>
                <input type="date" value={form.fecha} onChange={e => setForm(f => ({...f, fecha: e.target.value}))} />
              </div>

              <div className="field-row">
                <div className="field">
                  <label>Coste (€)</label>
                  <input type="number" step="0.01" placeholder="12.50" value={form.coste} onChange={e => setForm(f => ({...f, coste: e.target.value}))} />
                </div>
                <div className="field">
                  <label>kWh cargados</label>
                  <input type="number" step="0.1" placeholder="40.0" value={form.kwh} onChange={e => setForm(f => ({...f, kwh: e.target.value}))} />
                </div>
              </div>

              {/* PRECIO GAS */}
              <div className="field">
                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'6px'}}>
                  <label style={{margin:0}}>Precio gasolina 95 (€/L)</label>
                  <div style={{display:'flex', alignItems:'center', gap:6}}>
                    {gasFetchStatus === 'loading' && (
                      <span style={{fontSize:'0.65rem', color:'var(--accent)', display:'flex', alignItems:'center', gap:4}}>
                        <span className="dot loading" style={{width:5,height:5}}/>consultando...
                      </span>
                    )}
                    {gasFetchStatus === 'ok' && gasSource === 'station'  && <span style={{fontSize:'0.65rem', color:'var(--green)'}}>✓ tu gasolinera</span>}
                    {gasFetchStatus === 'ok' && gasSource === 'nacional' && <span style={{fontSize:'0.65rem', color:'var(--accent)'}}>~ media nacional</span>}
                    {gasFetchStatus === 'error' && <span style={{fontSize:'0.65rem', color:'var(--danger)'}}>sin datos auto</span>}
                    <button className="btn btn-ghost" style={{padding:'2px 8px', fontSize:'0.65rem'}}
                      onClick={fetchPrecioGasolina} disabled={gasFetchStatus === 'loading'}>⟳</button>
                  </div>
                </div>
                <input type="number" step="0.001" placeholder="1.689" value={form.precioGas}
                  onChange={e => { setForm(f => ({...f, precioGas: e.target.value})); setGasFetchStatus('idle'); setGasSource(''); }} />
                {gasFetchStatus === 'ok' && (
                  <div style={{fontSize:'0.65rem', color:'var(--muted)', marginTop:4}}>
                    {gasSource === 'station'
                      ? <>⛽ <strong style={{color:'var(--text)'}}>{stationRef?.rotulo}</strong> · {stationRef?.localidad}</>
                      : <>Media nacional · <a href="https://geoportalgasolineras.es" target="_blank" style={{color:'var(--accent)', textDecoration:'none'}}>MITECO</a></>
                    }
                    {' '}· puedes ajustarlo manualmente
                  </div>
                )}
              </div>

              {form.coste && form.kwh && parseFloat(form.kwh) > 0 && (
                <div style={{fontSize:'0.72rem', color:'var(--muted)', marginBottom:'14px', background:'rgba(0,229,255,0.05)', padding:'8px 12px', borderRadius:'6px'}}>
                  → {(parseFloat(form.coste)/parseFloat(form.kwh)).toFixed(4)} €/kWh
                </div>
              )}

              <button className="btn btn-primary" style={{width:'100%', justifyContent:'center', padding:'12px'}}
                onClick={handleSubmit} disabled={saving || authStatus !== 'ok'}>
                {saving ? '⟳ Guardando…' : '+ Añadir recarga'}
              </button>
            </div>

            <div className="km-section" style={{marginTop:'16px'}}>
              <div className="km-title">📍 Kilómetros del mes</div>
              <div className="field-row" style={{alignItems:'flex-end'}}>
                <div className="field" style={{margin:0}}>
                  <label>km recorridos</label>
                  <input type="number" placeholder="800" value={kmMes} onChange={e => setKmMes(e.target.value)} style={{margin:0}} />
                </div>
                <div className="field" style={{margin:0}}>
                  <label>Consumo ref. (L/100km)</label>
                  <input type="number" step="0.1" placeholder="7" value={consumoRef}
                    onChange={e => { setConsumoRef(e.target.value); localStorage.setItem(CONSUMO_KEY, e.target.value); }} style={{margin:0}} />
                </div>
              </div>
            </div>
          </div>

          <div className="card" style={{padding:'20px'}}>
            <div className="card-title" style={{marginBottom:'12px'}}>Historial — {MESES[viewMonth]} {viewYear}</div>
            <div className="table-wrap">
              {filteredRows.length === 0 ? (
                <div className="empty-state">
                  <span className="icon">⚡</span>
                  Sin recargas en {MESES[viewMonth]}<br/>
                  <span style={{opacity:0.5}}>Añade tu primera recarga</span>
                </div>
              ) : (
                <table>
                  <thead><tr><th>Fecha</th><th>Coste</th><th>kWh</th><th>€/kWh</th><th>Gas €/L</th><th></th></tr></thead>
                  <tbody>
                    {filteredRows.map((r, i) => (
                      <tr key={i}>
                        <td className="td-date">{r.fecha}</td>
                        <td className="td-eur">{r.coste.toFixed(2)} €</td>
                        <td className="td-kwh">{r.kwh.toFixed(1)}</td>
                        <td className="td-rate">{r.precioKwh > 0 ? r.precioKwh.toFixed(4) : '—'}</td>
                        <td className="td-gas">{r.precioGas > 0 ? r.precioGas.toFixed(3) : '—'}</td>
                        <td><button className="btn btn-danger" onClick={() => setDeleteModal(r)} disabled={saving}>✕</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>

        {kmsMes > 0 && filteredRows.length > 0 && (
          <div className="comparador">
            <div className="card-title">Comparador mensual — {MESES[viewMonth]}</div>
            <div className="comp-grid">
              <div className="comp-item electric">
                <div className="comp-label">⚡ Eléctrico</div>
                <div className="comp-val">{costKmElec.toFixed(4)}</div>
                <div className="comp-unit">€ / km</div>
                <div style={{marginTop:8, fontSize:'0.7rem', color:'var(--muted)'}}>{totalCoste.toFixed(2)}€ en {kmsMes} km</div>
              </div>
              <div className="comp-item gas">
                <div className="comp-label">⛽ {stationRef ? stationRef.rotulo : 'Gasolina (ref.)'}</div>
                <div className="comp-val">{costKmGas > 0 ? costKmGas.toFixed(4) : '—'}</div>
                <div className="comp-unit">€ / km</div>
                <div style={{marginTop:8, fontSize:'0.7rem', color:'var(--muted)'}}>{cRef}L/100km × {avgPrecioGas.toFixed(3)}€/L (media del mes)</div>
              </div>
            </div>
            {ahorro !== null && parseFloat(ahorro) > 0 && (
              <div className="saving-badge">
                🎯 Ahorras un <strong>{ahorro}%</strong> respecto a la gasolina — {((costKmGas - costKmElec) * kmsMes).toFixed(2)}€ este mes
              </div>
            )}
            {ahorro !== null && parseFloat(ahorro) <= 0 && (
              <div className="saving-badge" style={{background:'rgba(255,107,53,0.08)', borderColor:'rgba(255,107,53,0.2)', color:'var(--accent2)'}}>
                ⚠️ Este mes la gasolina habría salido más barata en un {Math.abs(parseFloat(ahorro))}%
              </div>
            )}
          </div>
        )}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
